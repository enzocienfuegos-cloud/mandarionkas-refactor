version: '3.9'

services:

  # ── PostgreSQL ────────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: smx_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER:     ${POSTGRES_USER:-smx}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-smxpassword}
      POSTGRES_DB:       ${POSTGRES_DB:-smx_studio}
    ports:
      - '${POSTGRES_PORT:-5432}:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-smx} -d ${POSTGRES_DB:-smx_studio}']
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Redis (job queues + session store) ────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: smx_redis
    restart: unless-stopped
    ports:
      - '${REDIS_PORT:-6379}:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 10

  # ── API server ────────────────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: smx_api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV:         production
      DATABASE_URL:     postgres://${POSTGRES_USER:-smx}:${POSTGRES_PASSWORD:-smxpassword}@postgres:5432/${POSTGRES_DB:-smx_studio}
      REDIS_URL:        redis://redis:6379
      SESSION_SECRET:   ${SESSION_SECRET}
      PORT:             4000
      HOST:             0.0.0.0
      CORS_ORIGIN:      ${CORS_ORIGIN:-http://localhost:5173}
      STORAGE_DRIVER:   ${STORAGE_DRIVER:-local}
      S3_BUCKET:        ${S3_BUCKET:-}
      S3_REGION:        ${S3_REGION:-us-east-1}
      AWS_ACCESS_KEY_ID:     ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
    ports:
      - '${API_PORT:-4000}:4000'
    volumes:
      - uploads:/app/uploads

  # ── Background worker ─────────────────────────────────────────────────────────
  worker:
    build:
      context: .
      dockerfile: apps/worker/Dockerfile
    container_name: smx_worker
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV:     production
      DATABASE_URL: postgres://${POSTGRES_USER:-smx}:${POSTGRES_PASSWORD:-smxpassword}@postgres:5432/${POSTGRES_DB:-smx_studio}
      REDIS_URL:    redis://redis:6379
      STORAGE_DRIVER: ${STORAGE_DRIVER:-local}
      S3_BUCKET:    ${S3_BUCKET:-}
    volumes:
      - uploads:/app/uploads

  # ── Web (built static files served via nginx) ─────────────────────────────────
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: smx_web
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - '${WEB_PORT:-80}:80'
    environment:
      VITE_API_URL: ${VITE_API_URL:-http://localhost:4000}

volumes:
  postgres_data:
  redis_data:
  uploads:
