# DigitalOcean App Platform — Portal staging
#
# Branch: codex/s50-staging-rc
# Repo: enzocienfuegos-cloud/mandarionkas-refactor

name: smx-studio-portal-staging
region: nyc

alerts:
  - rule: DEPLOYMENT_FAILED
  - rule: DOMAIN_FAILED

features:
  - buildpack-stack=ubuntu-22

static_sites:
  - name: portal
    github:
      repo: enzocienfuegos-cloud/mandarionkas-refactor
      branch: codex/s50-staging-rc
      deploy_on_push: false
    source_dir: ./
    environment_slug: node-js
    build_command: npm run build:portal
    output_dir: apps/portal/dist
    catchall_document: index.html

    envs:
      - key: VITE_API_BASE_URL
        scope: BUILD_TIME
        type: GENERAL
        value: https://api-staging.duskplatform.co
      - key: VITE_AD_SERVER_URL
        scope: BUILD_TIME
        type: GENERAL
        value: https://app-staging.duskplatform.co
      - key: VITE_STUDIO_URL
        scope: BUILD_TIME
        type: GENERAL
        value: https://studio-staging.duskplatform.co
      - key: VITE_APP_ENV
        scope: BUILD_TIME
        type: GENERAL
        value: staging
