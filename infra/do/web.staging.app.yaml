# DigitalOcean App Platform — Ad Server web staging
#
# Branch: codex/s50-staging-rc
# Repo: enzocienfuegos-cloud/dusk
#
# S51 fix: catchall_document changed from index.html to 404.html.
#
# Why: DO App Platform static sites serve the catchall when a requested path
# doesn't match a file in the output directory. The file must exist in the
# dist output. Vite doesn't generate 404.html by default — the spa404Plugin
# in vite.config.ts now copies index.html → 404.html after every build.
#
# Using 404.html (instead of index.html) is the correct DO pattern:
#   https://docs.digitalocean.com/products/app-platform/how-to/manage-static-sites/
#
# Also fixed: app name was "smx-studio-web-staging" (wrong product label).

name: smx-adserver-web-staging
region: nyc

alerts:
  - rule: DEPLOYMENT_FAILED
  - rule: DOMAIN_FAILED

features:
  - buildpack-stack=ubuntu-22

static_sites:
  - name: web
    github:
      repo: enzocienfuegos-cloud/mandarionkas-refactor
      branch: codex/s50-staging-rc
      deploy_on_push: false
    source_dir: ./
    environment_slug: node-js
    build_command: npm run build:web
    output_dir: apps/web/dist
    # SPA fallback: any path not matching a real file gets served 404.html,
    # which is a copy of index.html. React Router then handles the route.
    catchall_document: 404.html

    envs:
      - key: VITE_API_BASE_URL
        scope: BUILD_TIME
        type: GENERAL
        value: https://api-staging.duskplatform.co
      - key: VITE_PORTAL_URL
        scope: BUILD_TIME
        type: GENERAL
        value: https://portal-staging.duskplatform.co
      - key: VITE_STUDIO_URL
        scope: BUILD_TIME
        type: GENERAL
        value: https://studio-staging.duskplatform.co
      - key: VITE_TAGS_BASE_URL
        scope: BUILD_TIME
        type: GENERAL
        value: https://api-staging.duskplatform.co
      - key: VITE_ASSETS_BASE_URL
        scope: BUILD_TIME
        type: GENERAL
        value: https://cdn-staging.duskplatform.co
      - key: VITE_APP_ENV
        scope: BUILD_TIME
        type: GENERAL
        value: staging
