# DigitalOcean App Platform — Ad Server Web Frontend (apps/web)
#
# S43: Added VITE_PORTAL_URL so ProductLauncher redirects to the portal root
# for users with Studio access or no Ad Server access.

name: smx-studio-web
region: nyc

alerts:
  - rule: DEPLOYMENT_FAILED
  - rule: DOMAIN_FAILED

features:
  - buildpack-stack=ubuntu-22

static_sites:
  - name: web
    github:
      repo: YOUR_ORG/YOUR_REPO
      branch: main
      deploy_on_push: true
    source_dir: ./
    environment_slug: node-js
    build_command: npm run build:web
    output_dir: apps/web/dist
    catchall_document: index.html

    # domains:
    #   - domain: app.YOUR_DOMAIN.com
    #     type: PRIMARY

    envs:
      - key: VITE_API_BASE_URL
        scope: BUILD_TIME
        type: GENERAL
        value: https://api.YOUR_DOMAIN.com

      # S43: Enables ProductLauncher to redirect to the canonical portal.
      # Without this, the inline dual-launcher renders instead.
      - key: VITE_PORTAL_URL
        scope: BUILD_TIME
        type: GENERAL
        value: https://portal.YOUR_DOMAIN.com

      - key: VITE_STUDIO_URL
        scope: BUILD_TIME
        type: GENERAL
        value: https://studio.YOUR_DOMAIN.com
      - key: VITE_TAGS_BASE_URL
        scope: BUILD_AND_RUN_TIME
        type: GENERAL
        value: https://api.YOUR_DOMAIN.com

      - key: VITE_ASSETS_BASE_URL
        scope: BUILD_TIME
        type: GENERAL
        value: https://assets.YOUR_DOMAIN.com

      - key: VITE_APP_ENV
        scope: BUILD_TIME
        type: GENERAL
        value: production
