# DigitalOcean App Platform spec for the public editor frontend.
# Replace github.repo and the domain values before applying.
name: smx-studio-web
region: nyc
alerts:
  - rule: DEPLOYMENT_FAILED
  - rule: DOMAIN_FAILED
features:
  - buildpack-stack=ubuntu-22
static_sites:
  - name: web
    github:
      repo: your-org/your-repo
      branch: main
      deploy_on_push: true
    source_dir: ./
    environment_slug: node-js
    build_command: npm run build:web
    output_dir: apps/web/dist
    catchall_document: index.html
    envs:
      - key: VITE_API_BASE_URL
        scope: BUILD_TIME
        type: GENERAL
        value: https://api.example.com
      - key: VITE_ASSETS_BASE_URL
        scope: BUILD_TIME
        type: GENERAL
        value: https://assets.example.com
      - key: VITE_APP_ENV
        scope: BUILD_TIME
        type: GENERAL
        value: production
