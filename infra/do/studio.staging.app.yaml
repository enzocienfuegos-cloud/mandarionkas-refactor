# DigitalOcean App Platform — Studio staging
#
# Branch: codex/s50-staging-rc
# Repo: enzocienfuegos-cloud/dusk

name: smx-studio-studio-staging
region: nyc

alerts:
  - rule: DEPLOYMENT_FAILED
  - rule: DOMAIN_FAILED

features:
  - buildpack-stack=ubuntu-22

static_sites:
  - name: studio
    github:
      repo: enzocienfuegos-cloud/dusk
      branch: codex/s50-staging-rc
      deploy_on_push: false
    source_dir: ./
    environment_slug: node-js
    build_command: npm run build:studio
    output_dir: apps/studio/dist
    catchall_document: index.html

    envs:
      - key: VITE_API_BASE_URL
        scope: BUILD_TIME
        type: GENERAL
        value: https://api-staging.duskplatform.co
      - key: VITE_ASSETS_BASE_URL
        scope: BUILD_TIME
        type: GENERAL
        value: https://cdn-staging.duskplatform.co
      - key: VITE_APP_ENV
        scope: BUILD_TIME
        type: GENERAL
        value: staging
