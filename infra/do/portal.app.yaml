# DigitalOcean App Platform — Portal (unified launcher + identity shell)
#
# S43: Replaced all example.com placeholders.
# Apply with: doctl apps create --spec infra/do/portal.app.yaml
#             doctl apps update <APP_ID> --spec infra/do/portal.app.yaml
#
# BEFORE APPLYING:
#   1. Replace YOUR_ORG/YOUR_REPO with your GitHub org/repo.
#   2. Replace every YOUR_* placeholder with actual values.
#   3. VITE_* vars are baked into the JS bundle at build time.
#      Changing them requires a full rebuild + redeploy.

name: smx-studio-portal
region: nyc

alerts:
  - rule: DEPLOYMENT_FAILED
  - rule: DOMAIN_FAILED

features:
  - buildpack-stack=ubuntu-22

static_sites:
  - name: portal
    github:
      repo: YOUR_ORG/YOUR_REPO
      branch: main
      deploy_on_push: true
    source_dir: ./
    environment_slug: node-js
    build_command: npm run build:portal
    output_dir: apps/portal/dist
    catchall_document: index.html

    # Uncomment after DNS is propagated:
    # domains:
    #   - domain: portal.YOUR_DOMAIN.com
    #     type: PRIMARY

    envs:
      - key: VITE_API_BASE_URL
        scope: BUILD_TIME
        type: GENERAL
        value: https://api.YOUR_DOMAIN.com

      - key: VITE_AD_SERVER_URL
        scope: BUILD_TIME
        type: GENERAL
        value: https://app.YOUR_DOMAIN.com

      - key: VITE_STUDIO_URL
        scope: BUILD_TIME
        type: GENERAL
        value: https://studio.YOUR_DOMAIN.com

      - key: VITE_APP_ENV
        scope: BUILD_TIME
        type: GENERAL
        value: production
